stages:
  - validate
  - test

variables:
  COMPOSER_ALLOW_SUPERUSER: 1
  COMPOSER_CACHE_DIR: ".composer-cache"
  TYPO3_PATH_ROOT: "$CI_PROJECT_DIR/.Build/web"

.php-test:
  stage: test
  image: kanti/buildy:${PHP_VERSION}
  cache:
    key: composer-cache-${PHP_VERSION}
    paths:
      - .composer-cache/
  before_script:
    - composer install --no-progress --no-interaction
  script:
    - .Build/bin/phpunit -c phpunit.xml

validate:composer:
  stage: validate
  image: composer:latest
  script:
    - composer validate --strict

php-8.2:
  extends: .php-test
  variables:
    PHP_VERSION: "8.2"

php-8.3:
  extends: .php-test
  variables:
    PHP_VERSION: "8.3"

php-8.4:
  extends: .php-test
  variables:
    PHP_VERSION: "8.4"
