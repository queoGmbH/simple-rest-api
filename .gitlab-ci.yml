stages:
  - test
  - release

variables:
  COMPOSER_ALLOW_SUPERUSER: 1
  COMPOSER_CACHE_DIR: ".composer-cache"
  TYPO3_PATH_ROOT: "$CI_PROJECT_DIR/.Build/Web"
  GIT_STRATEGY: fetch   # Tags werden benötigt
  GIT_DEPTH: 0          # Voller Clone, um Tags zu bekommen

.php-unit-test:
  stage: test
  image: kanti/buildy:${PHP_VERSION}
  cache:
    key: composer-cache-${PHP_VERSION}-${TYPO3_VERSION}
    paths:
      - .composer-cache/
  before_script:
    - composer req typo3/cms-core:${TYPO3_VERSION} typo3/cms-frontend:${TYPO3_VERSION} --no-update
    - composer req --dev typo3/cms-backend:${TYPO3_VERSION} typo3/cms-fluid-styled-content:${TYPO3_VERSION} typo3/cms-info:${TYPO3_VERSION} typo3/cms-install:${TYPO3_VERSION} typo3/cms-workspaces:${TYPO3_VERSION} --no-update
    - composer update --with-all-dependencies --no-progress --no-interaction
  script:
    - php ./.Build/bin/phpunit -c phpunit.xml
    - php ./.Build/bin/phpunit -c phpunit-integration.xml

# TYPO3 11 LTS - PHP 8.0, 8.1
php-unit-test-8.0-11:
  extends: .php-unit-test
  variables:
    PHP_VERSION: "8.0"
    TYPO3_VERSION: "^11.5"

php-unit-test-8.1-11:
  extends: .php-unit-test
  variables:
    PHP_VERSION: "8.1"
    TYPO3_VERSION: "^11.5"

release_composer_package:
  stage: release
  image: curlimages/curl:latest
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v?\d+\.\d+\.\d+(-[\w\.\d]+)?$/i'
      when: always
    - when: never
  script:
    - |
      echo "Publish Composer Package Release for Tag $CI_COMMIT_TAG..."
      if [[ -z "$CI_COMMIT_TAG" ]]; then
        echo "No tag found, skip release script."
        exit 0
      fi

      # Fetch projekt id
      PROJECT_ID=$CI_PROJECT_ID

      # Token for API authentifizierung
      # Use CI_JOB_TOKEN for authentication
      TOKEN="${CI_JOB_TOKEN}"

      # Generate API url
      API_URL="https://gitlab.cloud.queo.org/api/v4/projects/$PROJECT_ID/packages/composer"

      # Debug output
      echo "=== Debug Information ==="
      echo "Project ID: $PROJECT_ID"
      echo "Tag: $CI_COMMIT_TAG"
      echo "API URL: $API_URL"
      echo "Token length: ${#TOKEN}"
      echo "========================="

      # Send POST request for publishing the composer package
      # Use -o to separate body from status code
      echo "Sending POST request to GitLab API..."
      response_body=$(mktemp)
      http_code=$(curl --silent --show-error -w "%{http_code}" -o "$response_body" -X POST "$API_URL" --header "JOB-TOKEN: $TOKEN" --data-urlencode "tag=$CI_COMMIT_TAG")

      # Show response details
      echo "=== Response Details ==="
      echo "HTTP Status Code: $http_code"
      echo "Response Body:"
      cat "$response_body"
      echo ""
      echo "========================"

      # Check HTTP response code
      if [ "$http_code" == "201" ] || [ "$http_code" == "200" ]; then
        echo "✓ Composer Package release successfully published."
      else
        echo "✗ Error during publish process, HTTP Code: $http_code"
        echo "Response Body:"
        cat "$response_body"
        rm "$response_body"
        exit 1
      fi

      rm "$response_body"
