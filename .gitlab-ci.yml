stages:
  - build-images
  - test
  - release
  - mirror

variables:
  COMPOSER_ALLOW_SUPERUSER: 1
  COMPOSER_CACHE_DIR: ".composer-cache"
  TYPO3_PATH_ROOT: "$CI_PROJECT_DIR/.Build/Web"
  GIT_STRATEGY: fetch   # Tags werden benötigt
  GIT_DEPTH: 0          # Voller Clone, um Tags zu bekommen

.php-grumphp:
  stage: test
  image: kanti/buildy:${PHP_VERSION}
  cache:
    key: composer-cache-${PHP_VERSION}
    paths:
      - .composer-cache/
  before_script:
    - composer req typo3/cms-core:${TYPO3_VERSION} typo3/cms-frontend:${TYPO3_VERSION}
    - composer req --dev typo3/cms-backend:${TYPO3_VERSION} typo3/cms-fluid-styled-content:${TYPO3_VERSION} typo3/cms-info:${TYPO3_VERSION} typo3/cms-install:${TYPO3_VERSION} typo3/cms-workspaces:${TYPO3_VERSION}
    - composer install --no-progress --no-interaction
  script:
    - php ./.Build/bin/grumphp run

.php-unit-test:
  stage: test
  image: kanti/buildy:${PHP_VERSION}
  cache:
    key: composer-cache-${PHP_VERSION}
    paths:
      - .composer-cache/
  before_script:
    - composer req typo3/cms-core:${TYPO3_VERSION} typo3/cms-frontend:${TYPO3_VERSION}
    - composer req --dev typo3/cms-backend:${TYPO3_VERSION} typo3/cms-fluid-styled-content:${TYPO3_VERSION} typo3/cms-info:${TYPO3_VERSION} typo3/cms-install:${TYPO3_VERSION} typo3/cms-workspaces:${TYPO3_VERSION}
    - composer install --no-progress --no-interaction
  script:
    - php ./.Build/bin/phpunit -c phpunit.xml
    - php ./.Build/bin/phpunit -c phpunit-integration.xml

php-grumphp-8.2-13:
  extends: .php-grumphp
  variables:
    PHP_VERSION: "8.2"
    TYPO3_VERSION: "^13.4"

php-grumphp-8.5-13:
  extends: .php-grumphp
  variables:
    PHP_VERSION: "8.5"
    TYPO3_VERSION: "^13.4"

php-unit-test-8.2-13:
  extends: .php-unit-test
  variables:
    PHP_VERSION: "8.2"
    TYPO3_VERSION: "^13.4"

php-unit-test-8.3-13:
  extends: .php-unit-test
  variables:
    PHP_VERSION: "8.3"
    TYPO3_VERSION: "^13.4"

php-unit-test-8.4-13:
  extends: .php-unit-test
  variables:
    PHP_VERSION: "8.4"
    TYPO3_VERSION: "^13.4"

php-unit-test-8.5-13:
  extends: .php-unit-test
  variables:
    PHP_VERSION: "8.5"
    TYPO3_VERSION: "^13.4"

# TYPO3 14 unit tests: saschaegerer/phpstan-typo3 has no TYPO3 14 release yet,
# so we strip analysis-only dev packages that conflict before pinning TYPO3 14.
.php-unit-test-typo3-14:
  stage: test
  image: kanti/buildy:${PHP_VERSION}
  cache:
    key: composer-cache-${PHP_VERSION}
    paths:
      - .composer-cache/
  before_script:
    - composer remove --dev saschaegerer/phpstan-typo3 --no-update
    - composer req typo3/cms-core:${TYPO3_VERSION} typo3/cms-frontend:${TYPO3_VERSION}
    - composer req --dev typo3/cms-backend:${TYPO3_VERSION} typo3/cms-fluid-styled-content:${TYPO3_VERSION} typo3/cms-info:${TYPO3_VERSION} typo3/cms-install:${TYPO3_VERSION} typo3/cms-workspaces:${TYPO3_VERSION}
    - composer install --no-progress --no-interaction
  script:
    - php ./.Build/bin/phpunit -c phpunit.xml
    - php ./.Build/bin/phpunit -c phpunit-integration.xml

php-unit-test-8.2-14:
  extends: .php-unit-test-typo3-14
  variables:
    PHP_VERSION: "8.2"
    TYPO3_VERSION: "^14"

php-unit-test-8.3-14:
  extends: .php-unit-test-typo3-14
  variables:
    PHP_VERSION: "8.3"
    TYPO3_VERSION: "^14"

php-unit-test-8.4-14:
  extends: .php-unit-test-typo3-14
  variables:
    PHP_VERSION: "8.4"
    TYPO3_VERSION: "^14"

php-unit-test-8.5-14:
  extends: .php-unit-test-typo3-14
  variables:
    PHP_VERSION: "8.5"
    TYPO3_VERSION: "^14"

# --- Test runner image build ---------------------------------------------------

.build-test-runner-image:
  stage: build-images
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
  script:
    - |
      docker build \
        --build-arg PHP_VERSION=${PHP_VERSION} \
        -t "$CI_REGISTRY_IMAGE/test-runner:${PHP_VERSION}" \
        -f Dev/Dockerfile.test-runner \
        .
    - docker push "$CI_REGISTRY_IMAGE/test-runner:${PHP_VERSION}"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - Dev/Dockerfile.test-runner
    - when: never

build-test-runner-8.2:
  extends: .build-test-runner-image
  variables:
    PHP_VERSION: "8.2"

build-test-runner-8.3:
  extends: .build-test-runner-image
  variables:
    PHP_VERSION: "8.3"

build-test-runner-8.4:
  extends: .build-test-runner-image
  variables:
    PHP_VERSION: "8.4"

# --- Coverage ------------------------------------------------------------------

coverage:
  stage: test
  image: $CI_REGISTRY_IMAGE/test-runner:8.4
  cache:
    key: composer-cache-coverage
    paths:
      - .composer-cache/
  before_script:
    - composer req typo3/cms-core:^13.4 typo3/cms-frontend:^13.4
    - composer req --dev typo3/cms-backend:^13.4 typo3/cms-fluid-styled-content:^13.4 typo3/cms-info:^13.4 typo3/cms-install:^13.4 typo3/cms-workspaces:^13.4
    - composer install --no-progress --no-interaction
  script:
    # Integration first — Cobertura only (different bootstrap, no stdout needed for badge)
    - php .Build/bin/phpunit -c phpunit-integration.xml --coverage-cobertura=coverage-integration.xml
    # Unit last — Cobertura + text so the badge regex captures unit coverage percentage
    - php .Build/bin/phpunit -c phpunit.xml --coverage-cobertura=coverage-unit.xml --coverage-text
  coverage: '/Lines:\s+\d+\.\d+%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: "coverage-*.xml"

# -------------------------------------------------------------------------------

release_composer_package:
  stage: release
  image: curlimages/curl:latest
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v?\d+\.\d+\.\d+(-[\w\.\d]+)?$/i'
      when: always
    - when: never
  script:
    - |
      echo "Publish Composer Package Release for Tag $CI_COMMIT_TAG..."
      if [[ -z "$CI_COMMIT_TAG" ]]; then
        echo "No tag found, skip release script."
        exit 0
      fi

      # Fetch projekt id
      PROJECT_ID=$CI_PROJECT_ID

      # Token for API authentifizierung
      # Use CI_JOB_TOKEN for authentication
      TOKEN="${CI_JOB_TOKEN}"

      # Generate API url
      API_URL="https://gitlab.cloud.queo.org/api/v4/projects/$PROJECT_ID/packages/composer"

      # Send POST request for publishing the composer package
      response=$(curl --silent --show-error --fail -w "%{http_code}" -X POST "$API_URL" --header "JOB-TOKEN: $TOKEN" --data-urlencode "tag=$CI_COMMIT_TAG")

      # Check HTTP response code (last 3 characters)
      http_code="${response: -3}"

      if [ "$http_code" == "201" ] || [ "$http_code" == "200" ]; then
        echo "Composer Package release successfully published."
      else
        echo "Error during publish process, HTTP Code: $http_code"
        echo "Response: $response"
        exit 1
      fi

.e2e-base:
  stage: test
  image: kanti/buildy:8.4
  services:
    - name: mariadb:10.11
      alias: mariadb
  variables:
    MARIADB_ROOT_PASSWORD: root
    MARIADB_DATABASE: typo3_test
    MYSQL_ROOT_PASSWORD: root
    MYSQL_DATABASE: typo3_test
    TYPO3_CONTEXT: Development
    BASE_URL: "http://localhost:8080"
    TYPO3_DB_DRIVER: mysqli
    TYPO3_DB_HOST: mariadb
    TYPO3_DB_PORT: "3306"
    TYPO3_DB_DBNAME: typo3_test
    TYPO3_DB_USERNAME: root
    TYPO3_DB_PASSWORD: root
  script:
    - cd Tests/E2e
    - npm ci
    - npm audit --audit-level=high
    - npx playwright test
  artifacts:
    when: always
    paths:
      - Tests/E2e/test-results/
      - Tests/E2e/playwright-report/
    reports:
      junit: Tests/E2e/test-results/results.xml

.e2e-typo3-setup:
  before_script:
    - for i in $(seq 1 90); do nc -z mariadb 3306 2>/dev/null && break; sleep 1; done
    - for i in $(seq 1 60); do mariadb-admin ping -h mariadb -u root -proot --skip-ssl 2>/dev/null && break; sleep 2; done
    - mariadb-admin ping -h mariadb -u root -proot --skip-ssl
    - >
      TYPO3_SETUP_ADMIN_USERNAME=admin
      TYPO3_SETUP_ADMIN_PASSWORD=Password1!
      TYPO3_SETUP_ADMIN_EMAIL=admin@example.com
      TYPO3_SETUP_CREATE_SITE="http://localhost:8080/"
      TYPO3_PROJECT_NAME=main
      TYPO3_SERVER_TYPE=apache
      php .Build/bin/typo3 setup --no-interaction --force
    - printf '<?php\n$GLOBALS["TYPO3_CONF_VARS"]["SYS"]["trustedHostsPattern"] = ".*";\n' > config/system/additional.php
    - find config/sites -name "config.yaml" | xargs -I{} cp Tests/Fixtures/ci/site-config.yaml {}
    - php .Build/bin/typo3 cache:flush
    - php -S 0.0.0.0:8080 -t .Build/Web/ Tests/Fixtures/ci/router.php &
    - until curl -s -o /dev/null http://localhost:8080/ 2>/dev/null; do sleep 1; done

e2e_tests_typo3_13:
  extends: .e2e-base
  before_script:
    - apk add --no-cache nodejs npm mariadb-client netcat-openbsd
    - composer install --no-progress --no-interaction
    - !reference [.e2e-typo3-setup, before_script]

e2e_tests_typo3_14:
  extends: .e2e-base
  before_script:
    - apk add --no-cache nodejs npm mariadb-client netcat-openbsd
    - composer remove --dev saschaegerer/phpstan-typo3 --no-update
    - composer req typo3/cms-core:^14 typo3/cms-frontend:^14
    - composer req --dev typo3/cms-backend:^14 typo3/cms-fluid-styled-content:^14 typo3/cms-info:^14 typo3/cms-install:^14 typo3/cms-workspaces:^14
    - composer install --no-progress --no-interaction
    - !reference [.e2e-typo3-setup, before_script]

mirror_to_github:
  stage: mirror
  image: python:3.12-slim
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
    - if: '$CI_COMMIT_TAG =~ /^v?\d+\.\d+\.\d+(-[\w\.\d]+)?$/i'
      when: on_success
    - when: never
  before_script:
    - apt-get update -qq && apt-get install -y -qq git openssh-client
    - pip install git-filter-repo --quiet
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - cp "$GITHUB_DEPLOY_KEY" ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
  script:
    - git clone --bare "$CI_REPOSITORY_URL" repo.git
    - cd repo.git
    - git filter-repo --path .claude --path CLAUDE.md --invert-paths --force
    - git remote add github "git@github.com:queoGmbH/simple-rest-api.git"
    - git push github 'refs/heads/*:refs/heads/*' --force
    - git push github 'refs/tags/*:refs/tags/*' --force
