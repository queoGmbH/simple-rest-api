stages:
  - test
  - release

variables:
  COMPOSER_ALLOW_SUPERUSER: 1
  COMPOSER_CACHE_DIR: ".composer-cache"
  TYPO3_PATH_ROOT: "$CI_PROJECT_DIR/.Build/Web"
  GIT_STRATEGY: fetch   # Tags werden benötigt
  GIT_DEPTH: 0          # Voller Clone, um Tags zu bekommen

.php-grumphp:
  stage: test
  image: kanti/buildy:${PHP_VERSION}
  cache:
    key: composer-cache-${PHP_VERSION}
    paths:
      - .composer-cache/
  before_script:
    - composer req typo3/cms-core:${TYPO3_VERSION} typo3/cms-frontend:${TYPO3_VERSION}
    - composer req --dev typo3/cms-backend:${TYPO3_VERSION} typo3/cms-fluid-styled-content:${TYPO3_VERSION} typo3/cms-info:${TYPO3_VERSION} typo3/cms-install:${TYPO3_VERSION} typo3/cms-workspaces:${TYPO3_VERSION}
    - composer install --no-progress --no-interaction
  script:
    - php ./.Build/bin/grumphp run

.php-unit-test:
  stage: test
  image: kanti/buildy:${PHP_VERSION}
  cache:
    key: composer-cache-${PHP_VERSION}
    paths:
      - .composer-cache/
  before_script:
    - composer req typo3/cms-core:${TYPO3_VERSION} typo3/cms-frontend:${TYPO3_VERSION}
    - composer req --dev typo3/cms-backend:${TYPO3_VERSION} typo3/cms-fluid-styled-content:${TYPO3_VERSION} typo3/cms-info:${TYPO3_VERSION} typo3/cms-install:${TYPO3_VERSION} typo3/cms-workspaces:${TYPO3_VERSION}
    - composer install --no-progress --no-interaction
  script:
    - php ./.Build/bin/phpunit -c phpunit.xml

php-grumphp-8.2-13:
  extends: .php-grumphp
  variables:
    PHP_VERSION: "8.2"
    TYPO3_VERSION: "^13.4"

php-unit-test-8.2-13:
  extends: .php-unit-test
  variables:
    PHP_VERSION: "8.2"
    TYPO3_VERSION: "^13.4"

php-unit-test-8.3-13:
  extends: .php-unit-test
  variables:
    PHP_VERSION: "8.3"
    TYPO3_VERSION: "^13.4"

php-unit-test-8.4-13:
  extends: .php-unit-test
  variables:
    PHP_VERSION: "8.4"
    TYPO3_VERSION: "^13.4"

php-unit-test-8.4-14:
  extends: .php-unit-test
  variables:
    PHP_VERSION: "8.4"
    TYPO3_VERSION: "14.0.x-dev"
  allow_failure: true

release_composer_package:
  stage: release
  image: curlimages/curl:latest  # schlankes Curl-Image
  script:
    - |
      echo "Publish Composer Package Release for Tag $CI_COMMIT_TAG..."
      if [[ -z "$CI_COMMIT_TAG" ]]; then
        echo "No tag found, skip release script."
        exit 0
      fi

      # Projekt-ID ermitteln (alternativ statisch setzen)
      PROJECT_ID=$CI_PROJECT_ID
      echo "${PROJECT_ID}"

      # Token für API-Authentifizierung
      # Nutze das CI_JOB_TOKEN oder Personal Access Token als VARIABLE
      TOKEN="${CI_JOB_TOKEN}"
      echo "${TOKEN}"

      # API-Endpoint für Composer Package Registry Release
      API_URL="https://gitlab.cloud.queo.org/api/v4/projects/$PROJECT_ID/packages/composer"
      echo "${API_URL}"

      # Sende POST-Anfrage zum Veröffentlichen des Composer Packages
      response=$(curl --silent --show-error --fail -w "%{http_code}" -X POST "$API_URL" --header "JOB-TOKEN: $TOKEN" --data-urlencode "tag=$CI_COMMIT_TAG")

      # Prüfe HTTP Response-Code (letzte 3 Zeichen)
      http_code="${response: -3}"

      if [ "$http_code" == "201" ] || [ "$http_code" == "200" ]; then
        echo "Composer Package Release erfolgreich veröffentlicht."
      else
        echo "Fehler beim Veröffentlichungsversuch, HTTP Code: $http_code"
        echo "Response: $response"
        exit 1
      fi
  only:
    - tags
