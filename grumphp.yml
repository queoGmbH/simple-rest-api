grumphp:
  tasks:
    composer:
      file: ./composer.json
      no_check_all: false
      no_check_lock: false
      no_check_publish: false
      no_local_repository: false
      with_dependencies: false
      strict: false
    composer_normalize:
      indent_size: ~
      indent_style: ~
      no_check_lock: true
      no_update_lock: false
      verbose: false
    git_blacklist:
      keywords:
        - "die\\("
        - "var_dump\\("
        - "exit;"
        - "DebuggerUtility"
        - "<f:debug"
      whitelist_patterns: [ ]
      triggered_by: [ 'php' ]
      regexp_type: G
      match_word: false
      ignore_patterns: [ ]
    git_commit_message:
      allow_empty_message: false
      enforce_capitalized_subject: true
      enforce_no_subject_punctuations: false
      enforce_no_subject_trailing_period: true
      enforce_single_lined_subject: true
      type_scope_conventions: [ ]
      skip_on_merge_commit: true
      max_body_width: 72
      max_subject_width: 60
      case_insensitive: true
      multiline: true
      additional_modifiers: ''
    jsonlint:
      ignore_patterns: [ ]
      detect_key_conflicts: false
    phpcs:
      standard: "PSR12"
      warning_severity: 0
      tab_width: 4
    phplint: ~
    xmllint: ~
    yamllint: ~
    phpstan:
      memory_limit: "-1"
      configuration: phpstan.neon
